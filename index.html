
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-touch-fullscreen" content="yes" />
  <meta name="theme-color" content="#181A1B" />
  <title>Launch</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #181A1B;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .launch-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      opacity: 0;
      transform: scale(0.88);
      animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
    }

    @keyframes popIn {
      to { opacity: 1; transform: scale(1); }
    }

    .icon-wrap {
      width: 120px;
      height: 120px;
      border-radius: 26px;
      overflow: hidden;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.55),
        0 2px 8px rgba(0,0,0,0.4),
        inset 0 0 0 0.5px rgba(255,255,255,0.12);
      background: #2a2a2a;
      position: relative;
    }

    .icon-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .app-title {
      color: #fff;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      text-align: center;
    }

    .launch-btn {
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 220px;
      height: 50px;
      background: #fff;
      color: #000;
      font-size: 17px;
      font-weight: 600;
      border-radius: 50px;
      text-decoration: none;
      letter-spacing: -0.2px;
      box-shadow: 0 4px 20px rgba(255,255,255,0.12);
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .launch-btn:active {
      transform: scale(0.95);
      opacity: 0.85;
    }

    .hint {
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      letter-spacing: 0.1px;
      margin-top: -6px;
    }
  </style>
</head>
<body>
  <div class="launch-wrap" id="wrap">
    <div class="icon-wrap">
      <img id="appIcon" src="" alt="" />
    </div>
    <div class="app-title" id="appTitle">App</div>
    <a class="launch-btn" id="launchBtn" href="#">Open</a>
    <div class="hint">Tap to open in iOS</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    // title
    const title = params.get('title') || 'App';
    document.getElementById('appTitle').textContent = title;
    document.getElementById('launchBtn').textContent = 'Open ' + title;
    document.title = title;

    // icon — hỗ trợ cả URL lẫn base64
    const icon = params.get('icon') || '';
    const img = document.getElementById('appIcon');
    if (icon) {
      // Nếu là base64 data URI (data:image/...) hoặc URL thường đều gán thẳng vào src
      img.src = icon;
    }

    // url (deep link)
    const url = params.get('url') || '#';
    const btn = document.getElementById('launchBtn');
    btn.href = url;

    // apple-touch-icon động
    const link = document.createElement('link');
    link.rel = 'apple-touch-icon';
    link.href = icon;
    document.head.appendChild(link);
  </script>
</body>
</html>
